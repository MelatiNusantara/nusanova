    function setCookie(name, value, days = COOKIE_DAYS) {
      try {
        const expires = new Date(Date.now() + days * 864e5).toUTCString();
        document.cookie = name + "=" + encodeURIComponent(value) + "; expires=" + expires + "; path=/; SameSite=Lax";
      } catch (e) {}
    }

    function getCookie(name) {
      try {
        const rawCookie = document.cookie || "";
        const cookies = rawCookie ? rawCookie.split("; ") : [];
        for (const cookie of cookies) {
          const parts = cookie.split("=");
          const key = parts.shift();
          const value = parts.join("=");
          if (key === name) return decodeURIComponent(value || "");
        }
      } catch (e) {}
      return "";
    }

    function deleteCookie(name) {
      try {
        document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax";
      } catch (e) {}
    }

    function saveAnswerToCookie(qid, value) {
      try {
        setCookie(STORAGE_PREFIX + qid, JSON.stringify(value));
      } catch (e) {}
    }

    function loadAnswersFromCookies() {
      const obj = {};
      QUESTIONS.forEach(q => {
        const raw = getCookie(STORAGE_PREFIX + q.id);
        if (raw) {
          try {
            obj[q.id] = JSON.parse(raw);
          } catch (e) {
            obj[q.id] = raw;
          }
        }

        const otherRaw = getCookie(STORAGE_PREFIX + q.id + "_other");
        if (otherRaw) {
          try {
            obj[q.id + "_other"] = JSON.parse(otherRaw);
          } catch (e) {
            obj[q.id + "_other"] = otherRaw;
          }
        }
      });
      return obj;
    }

    function loadAnswers() {
      let fromStorage = {};
      let fromCookies = {};

      try {
        fromStorage = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch (e) {
        fromStorage = {};
      }

      try {
        fromCookies = loadAnswersFromCookies();
      } catch (e) {
        fromCookies = {};
      }

      return { ...fromStorage, ...fromCookies };
    }

    function saveAnswers() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
      } catch (e) {}

      Object.entries(answers).forEach(([key, value]) => {
        saveAnswerToCookie(key, value);
      });

    function getDisplayAnswer(qid) {
      const q = questionById(qid);
      const value = answers[qid];

      if (!q) return "";

      if (Array.isArray(value)) {
        return value.map(v => {
          if (v === "other") return answers[qid + "_other"] || "Other";
          return optionLabel(q, v) || v;
        }).filter(Boolean).join(", ");
      }

      if (value === "other") {
        return answers[qid + "_other"] || "Other";
      }

      if (q.options) {
        return optionLabel(q, value) || value || "";
      }

      return String(value ?? "").trim();
    }

    function todayIsoDate() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getAssessmentYear() {

        const year = Number(dateValue.substring(0, 4));
        if (Number.isFinite(year)) return year;
      }

      return new Date().getFullYear();
    }

    async function saveAssessmentToBackend(mode, result) {
      if (isSavingAssessment) return null;

      isSavingAssessment = true;

      try {
        saveAnswers();

        const endpoint = mode === "submit"
          ? "/api/assessments/submit"
          : "/api/assessments/draft";

        const response = await fetch(API_BASE + endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(buildAssessmentPayload(result))
        });

        if (!response.ok) {
          let message = "Gagal menyimpan assessment.";

          try {
            const errorBody = await response.json();
            message = errorBody.message || message;
          } catch (e) {}

          throw new Error(message);
        }

        const data = await response.json();

        if (data.id) {
          currentAssessmentId = String(data.id);
          localStorage.setItem(ASSESSMENT_ID_KEY, currentAssessmentId);
        }

        return data;
      } finally {
        isSavingAssessment = false;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>'"]/g, ch => ({

        "'": "&#039;",

            ${
              max > 0
                ? `<div class="score-chip">Max ${max} pts</div>`
                : `<div class="score-chip neutral">Non-scoring</div>`
            }
          </div>

          ${renderInput(q)}

          <p class="field-error" id="err_${q.id}"></p>
        </article>
      `;
    }

    function renderInput(q) {
      const value = answers[q.id] ?? (q.type === "checkbox" ? [] : "");
      const common = `data-qid="${q.id}" name="${q.id}"`;

      if (q.type === "text" || q.type === "date" || q.type === "number" || q.type === "tel") {
        return `
          <input
            ${common}
            type="${q.type}"
            value="${escapeHtml(value)}"
            placeholder="${escapeHtml(q.placeholder || "")}">
        `;
      }

      if (q.type === "textarea") {
        return `
          <textarea
            ${common}
            rows="4"
            placeholder="${escapeHtml(q.placeholder || "Tulis jawaban di sini")}">${escapeHtml(value)}</textarea>
        `;
      }

      if (q.type === "select") {
        return `
          <select ${common}>
            <option value="">Pilih jawaban</option>
            ${(q.options || []).map(o => `
              <option value="${escapeHtml(o.value)}" ${value === o.value ? "selected" : ""}>
                ${escapeHtml(o.label)}
              </option>
            `).join("")}
          </select>

          ${
            q.other
              ? `<input
                  class="other-input"
                  data-other-for="${q.id}"
                  type="text"
                  value="${escapeHtml(answers[q.id + "_other"] || "")}"
                  placeholder="Tulis jawaban lainnya"
                  ${value === "other" ? "" : "hidden"}>`
              : ""
          }
        `;
      }

      if (q.type === "radio") {
        return `
          <div class="options ${q.options.length > 5 ? "dense" : ""}">
            ${(q.options || []).map(o => `
              <label class="option-card">
                <input
                  ${common}
                  type="radio"
                  value="${escapeHtml(o.value)}"
                  ${value === o.value ? "checked" : ""}>
                <span class="fake-control"></span>
                <span>${escapeHtml(o.label)}</span>
              </label>
            `).join("")}
          </div>

          ${
            q.other
              ? `<input
                  class="other-input"
                  data-other-for="${q.id}"
                  type="text"
                  value="${escapeHtml(answers[q.id + "_other"] || "")}"
                  placeholder="Tulis jawaban lainnya"
                  ${value === "other" ? "" : "hidden"}>`
              : ""
          }
        `;
      }

      if (q.type === "checkbox") {
        const selected = Array.isArray(value) ? value : [];

        return `
          <div class="options dense">
            ${(q.options || []).map(o => `
              <label class="option-card checkbox-option">
                <input
                  ${common}
                  type="checkbox"
                  value="${escapeHtml(o.value)}"
                  ${selected.includes(o.value) ? "checked" : ""}>
                <span class="fake-control"></span>
                <span>${escapeHtml(o.label)}</span>
              </label>
            `).join("")}

            ${
              q.other
                ? `<label class="option-card checkbox-option">
                    <input
                      ${common}
                      type="checkbox"
                      value="other"
                      ${selected.includes("other") ? "checked" : ""}>
                    <span class="fake-control"></span>
                    <span>Other</span>
                  </label>`
                : ""
            }
          </div>

          ${
            q.other
              ? `<input
                  class="other-input"
                  data-other-for="${q.id}"
                  type="text"
                  value="${escapeHtml(answers[q.id + "_other"] || "")}"
                  placeholder="Tulis jawaban lainnya"
                  ${selected.includes("other") ? "" : "hidden"}>`
              : ""
          }
        `;
      }

      return "";
    }

    function bindInputs(root) {
      $$("[data-qid]", root).forEach(el => {
        el.addEventListener("input", handleInput);
        el.addEventListener("change", handleInput);
      });

      $$("[data-other-for]", root).forEach(el => {
        el.addEventListener("input", e => {
          const key = e.target.dataset.otherFor + "_other";
          answers[key] = e.target.value;
          saveAnswerToCookie(key, e.target.value);
          saveAnswers();
          updateCompletionBadge();
        });
      });
    }

    function handleInput(e) {
      const el = e.target;
      const qid = el.dataset.qid;
      const q = questionById(qid);

      if (!q) return;

      if (q.type === "checkbox") {
        let checked = $$(`input[data-qid="${qid}"]:checked`).map(x => x.value);

        const exclusiveRules = {
          Q9: "no_legal",
          Q31: "none",
          Q45: "none"
        };

        const exclusive = exclusiveRules[qid];

        if (exclusive && checked.includes(exclusive) && checked.length > 1) {
          $$(`input[data-qid="${qid}"]`).forEach(x => {
            if (x.value !== exclusive) x.checked = false;
          });
          checked = [exclusive];
        } else if (exclusive && checked.length > 1 && !checked.includes(exclusive)) {
          const exInput = $(`input[data-qid="${qid}"][value="${exclusive}"]`);
          if (exInput) exInput.checked = false;
          checked = checked.filter(x => x !== exclusive);
        }

        answers[qid] = checked;

        const other = $(`[data-other-for="${qid}"]`);
        if (other) other.hidden = !checked.includes("other");
      } else if (q.type === "radio" || q.type === "select") {
        answers[qid] = el.value;

        const other = $(`[data-other-for="${qid}"]`);
        if (other) other.hidden = el.value !== "other";
      } else {
        answers[qid] = el.value;
      }

      saveAnswerToCookie(qid, answers[qid]);
      applyEmployeeDependencyDefaults();
      applyEbtDependencyDefaults();
      saveAnswers();
      clearError(qid);

      if (qid === "Q13" || qid === "Q30") {
        renderApp();
        return;
      }

      updateCompletionBadge();
    }

    function bindNavigation() {
      $("#prevSectionBtn")?.addEventListener("click", () => {
        currentSectionIndex = Math.max(0, currentSectionIndex - 1);
        renderApp();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      $("#nextSectionBtn")?.addEventListener("click", () => {
        const sections = visibleSections();
        const section = sections[currentSectionIndex];
        const invalid = sectionQuestions(section.id).find(q => !isAnswered(q));

        if (invalid) {
          validateQuestion(invalid);
          return;
        }

        currentSectionIndex = Math.min(sections.length - 1, currentSectionIndex + 1);
        renderApp();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      $("#finishBtn")?.addEventListener("click", () => {
        const sections = visibleSections();
        const section = sections[currentSectionIndex];
        const invalid = sectionQuestions(section.id).find(q => !isAnswered(q));

        if (invalid) {
          validateQuestion(invalid);
          return;
        }

        showDashboard();
      });

      $("#saveSectionBtn")?.addEventListener("click", async () => {
        const btn = $("#saveSectionBtn");

        try {
          if (btn) {
            btn.disabled = true;
            btn.textContent = "Menyimpan...";
          }

          await saveAssessmentToBackend("draft");

          toast("Draft berhasil disimpan ke database.");
        } catch (error) {
          console.error(error);
          toast("Gagal simpan draft: " + error.message);
        } finally {
          if (btn) {
            btn.disabled = false;
            btn.textContent = "Simpan Sementara";
          }
        }
      });

      $$("[data-jump-section]").forEach(btn => {
        btn.addEventListener("click", () => {
          currentSectionIndex = Number(btn.dataset.jumpSection);
          renderApp();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
    }

    function isAnswered(q) {
      const value = answers[q.id];

      if (isQuestionSkipped(q)) return true;
      if (!q.required) return true;

      if (q.type === "checkbox") {
        if (!Array.isArray(value) || value.length === 0) return false;
        if (value.includes("other")) {
          return String(answers[q.id + "_other"] || "").trim().length > 0;
        }
        return true;
      }

      if (q.other && value === "other") {
        return String(answers[q.id + "_other"] || "").trim().length > 0;
      }

      return String(value ?? "").trim().length > 0;
    }

    function validateQuestion(q) {
      const valid = isAnswered(q);
      const error = $("#err_" + q.id);
      const card = $("#card_" + q.id);

      if (!valid) {
        if (error) error.textContent = "Pertanyaan ini wajib diisi.";
        if (card) {
          card.classList.add("invalid");
          card.scrollIntoView({ behavior: "smooth", block: "center" });
        }
        return false;
      }

      clearError(q.id);
      return true;
    }

    function clearError(qid) {
      const error = $("#err_" + qid);
      const card = $("#card_" + qid);

      if (error) error.textContent = "";
      if (card) card.classList.remove("invalid");
    }

    function isSectionComplete(sectionId) {
      return sectionQuestions(sectionId).every(isAnswered);
    }

    function updateCompletionBadge() {
      const questions = activeQuestions();
      const done = questions.filter(isAnswered).length;
      const badge = $("#completionBadge");

      if (badge) {
        badge.textContent = `${done}/${questions.length} terisi`;
      }
    }

    function val(qid) {
      return answers[qid];
    }

    function arr(qid) {
      return Array.isArray(answers[qid]) ? answers[qid] : [];
    }

    function has(qid, value) {
      return arr(qid).includes(value);
    }

    function scoreByMap(qid, map) {
      return map[val(qid)] || 0;
    }

    function checkboxScoreCap(qid, weights, cap, noneValue) {
      const selected = arr(qid);

      if (noneValue && selected.includes(noneValue)) return 0;

      const score = selected.reduce((sum, item) => sum + (weights[item] || 0), 0);
      return Math.min(cap, score);
    }

    function sumScore(obj, keys) {
      return keys.reduce((sum, key) => sum + (obj[key] || 0), 0);
    }

    function calculateScores() {
      const qScores = {};

      qScores.Q9 = checkboxScoreCap("Q9", {
        nib: 3,
        npwp: 3,
        hki: 2,
        sertifikasi_produk: 2,
        pirt: 2,
        halal: 2,
        bpom: 2,
        izin_lingkungan: 3,
        hak_merek: 2,
        sku: 3,
        iso: 3
      }, 20, "no_legal");

      qScores.Q19 = scoreByMap("Q19", { yes: 10 });
      qScores.Q21 = scoreByMap("Q21", { gt75: 10, between50_75: 7, lt50: 4 });
      qScores.Q22 = scoreByMap("Q22", { all_umr: 10, permanent_only: 5, below_umr: 0 });

      qScores.Q23 = scoreByMap("Q23", { aligned: 30, partial: 15 });
      qScores.Q24 = scoreByMap("Q24", { yes: 30 });
      qScores.Q25 = scoreByMap("Q25", { yes: 15 });
      qScores.Q26 = scoreByMap("Q26", { yes: 15 });
      qScores.Q27 = scoreByMap("Q27", { complete: 20, partial: 10 });
      qScores.Q28 = scoreByMap("Q28", { easy: 15, on_request: 7 });
      qScores.Q29 = scoreByMap("Q29", { has: 25, making: 12 });

      qScores.Q30 = scoreByMap("Q30", { yes: 15 });
      qScores.Q31 = checkboxScoreCap("Q31", {
        efficiency: 5,
        renewable_electricity: 6,
        multipurpose: 4,
        clean_energy_distribution: 5,
        alternative_energy: 5
      }, 25, "none");
      qScores.Q32 = scoreByMap("Q32", { gt50: 25, lt50: 12 });
      qScores.Q33 = scoreByMap("Q33", { yes: 20, partial: 10 });
      qScores.Q34 = scoreByMap("Q34", { gt50: 30, progress: 15 });
      qScores.Q35 = scoreByMap("Q35", { yes: 25 });
      qScores.Q36 = scoreByMap("Q36", { yes: 30 });
      qScores.Q37 = scoreByMap("Q37", { yes: 25 });
      qScores.Q38 = scoreByMap("Q38", { routine: 20, once: 10 });
      qScores.Q40 = scoreByMap("Q40", { target: 35, informal: 17 });

      qScores.Q41 = scoreByMap("Q41", { strategic: 35, unrecorded: 17 });
      qScores.Q42 = scoreByMap("Q42", { yes: 25 });
      qScores.Q44 = scoreByMap("Q44", { receiving: 40, looking: 20 });
      qScores.Q46 = scoreByMap("Q46", { budgeted: 50, planned: 25, no_need: 10, no_plan: 0 });

      qScores.Q47 = scoreByMap("Q47", { gt30: 15, "21_30": 12, "11_20": 8, "1_10": 4 });
      qScores.Q48 = scoreByMap("Q48", { all: 35, some: 17 });
      qScores.Q49 = scoreByMap("Q49", { "3r": 30, mixed: 15 });
      qScores.Q50 = scoreByMap("Q50", { gt15: 10, lt15: 5 });
      qScores.Q51 = scoreByMap("Q51", { routine: 25, occasional: 12 });
      qScores.Q52 = scoreByMap("Q52", { gt6: 25, "3_6": 15, lt3: 5 });
      qScores.Q53 = scoreByMap("Q53", { gt6: 25, "3_6": 15, lt3: 5 });
      qScores.Q54 = checkboxScoreCap("Q54", {
        international: 5,
        government: 4,
        ngo: 4,
        peers: 3,
        finance: 5,
        academic: 4,
        consumer: 2,
        pemasok: 3,
        green_support: 4,
        association: 3
      }, 35);

      qScores.Q55 = scoreByMap("Q55", { all: 30, some: 15 });
      qScores.Q56 = scoreByMap("Q56", { routine: 40, occasional: 20 });
      qScores.Q57 = scoreByMap("Q57", { digital: 30 });

      qScores.Q58 = scoreByMap("Q58", { routine: 20, occasional: 10 });
      qScores.Q59 = scoreByMap("Q59", { formal: 15, informal: 7 });
      qScores.Q60 = scoreByMap("Q60", { complete: 25, incomplete: 12 });
      qScores.Q61 = scoreByMap("Q61", { lte40: 20, "41_48": 10, gt48: 0 });
      qScores.Q62 = scoreByMap("Q62", { formal: 20, informal: 10 });

      const sections = {
        A: {
          name: "A. Profil Usaha & SDM Dasar",
          score: sumScore(qScores, ["Q9", "Q19", "Q21", "Q22"]),
          max: 50
        },
        B: {
          name: "B. Dokumentasi, Komitmen & Tata Kelola",
          score: sumScore(qScores, ["Q23", "Q24", "Q25", "Q26", "Q27", "Q28", "Q29"]),
          max: 150
        },
        C: {
          name: "C. Proses & Produksi Hijau",
          score: sumScore(qScores, ["Q30", "Q31", "Q32", "Q33", "Q34", "Q35", "Q36", "Q37", "Q38", "Q40"]),
          max: 250
        },
        D: {
          name: "D. Keuangan & Inovasi",
          score: sumScore(qScores, ["Q41", "Q42", "Q44", "Q46"]),
          max: 150
        },
        E: {
          name: "E. Rantai Pasok & Ketahanan",
          score: sumScore(qScores, ["Q47", "Q48", "Q49", "Q50", "Q51", "Q52", "Q53", "Q54"]),
          max: 200
        },
        F: {
          name: "F. Digitalisasi & Promosi",
          score: sumScore(qScores, ["Q55", "Q56", "Q57"]),
          max: 100
        },
        G: {
          name: "G. Aspek Sosial & Kemitraan",
          score: sumScore(qScores, ["Q58", "Q59", "Q60", "Q61", "Q62"]),
          max: 100
        }
      };

      const total = Object.values(sections).reduce((sum, s) => sum + s.score, 0);

      const disqualifiedReasons = [];

      if (has("Q9", "no_legal")) {
        disqualifiedReasons.push("Q9: Belum memiliki dokumen legalitas.");
      }

      if (val("Q20") === "menengah" && val("Q22") === "below_umr") {
        disqualifiedReasons.push("Q20 Menengah dan Q22 gaji di bawah UMR.");
      }

      if (val("Q25") === "no") {
        disqualifiedReasons.push("Q25: Belum memiliki laporan keuangan.");
      }

      if (val("Q26") === "no") {
        disqualifiedReasons.push("Q26: Belum memisahkan keuangan pribadi dan usaha.");
      }

      let tier = 0;

      if (disqualifiedReasons.length === 0) {
        if (total < 200) tier = 0;
        else if (total < 400) tier = 1;
        else if (total < 600) tier = 2;
        else if (total < 800) tier = 3;
        else tier = 4;
      }

      const tierLabels = [
        "Tier 0 - Pra Hijau",
        "Tier 1 - Konvensional",
        "Tier 2 - Transisi Hijau",
        "Tier 3 - UMKM Hijau",
        "Tier 4 - Pemimpin Keberlanjutan"
      ];

      const recommendations = [
        "Prioritas kritis: urus legalitas, perbaiki kepatuhan UMR, pisahkan keuangan, siapkan laporan keuangan, dan lengkapi APD.",
        "Fokus: mulai Green SOP sederhana, dokumentasi dampak, penghematan energi/air, dan pencatatan keuangan lebih rapi.",
        "Fokus: sistemkan praktik hijau, buat laporan keberlanjutan, mulai seleksi pemasok hijau, dan cari pembiayaan hijau.",
        "Fokus: ukur carbon footprint rutin, perluas kemitraan strategis, publikasikan laporan, dan alokasikan investasi hijau.",
        "Excellent. Usaha dapat menjadi role model, memperluas pasar hijau, dan memimpin inisiatif keberlanjutan."
      ];

      const eScore = sumScore(qScores, ["Q30", "Q31", "Q32", "Q33", "Q34", "Q35", "Q36", "Q37", "Q38", "Q40", "Q49", "Q56"]);
      const sScore = sumScore(qScores, ["Q19", "Q22", "Q51", "Q58", "Q59", "Q60", "Q61", "Q62"]);
      const gScore = sumScore(qScores, ["Q9", "Q21", "Q23", "Q24", "Q25", "Q26", "Q27", "Q28", "Q29", "Q41", "Q42", "Q44", "Q46", "Q48", "Q52", "Q53", "Q54", "Q55", "Q57"]);

      const weakest = Object.values(sections)
        .slice()
        .sort((a, b) => (a.score / a.max) - (b.score / b.max))
        .slice(0, 2);

      return {
        qScores,
        sections,
        total,
        tier,
        tierLabel: tierLabels[tier],
        recommendation: recommendations[tier],
        disqualifiedReasons,
        eScore,
        sScore,
        gScore,
        weakest
      };
    }

    function showDashboard() {
      const missing = activeQuestions().filter(q => !isAnswered(q));

      if (missing.length) {
        const first = missing[0];
        const sectionIndex = visibleSections().findIndex(s => s.id === first.section);

        if (sectionIndex >= 0) {
          currentSectionIndex = sectionIndex;
          renderApp();
          validateQuestion(first);
        }

        toast(`${missing.length} pertanyaan belum diisi.`);
        return;
      }

     const result = calculateScores();
      const mount = $("#dashboardMount");
      mount.innerHTML = renderDashboard(result);
      mount.scrollIntoView({ behavior: "smooth", block: "start" });

      $("#printBtn")?.addEventListener("click", () => window.print());
      $("#copyBtn")?.addEventListener("click", () => copySummary(result));

      saveAssessmentToBackend("submit", result)
        .then(() => {
          toast("Assessment berhasil disubmit ke database.");
        })
        .catch(error => {
          console.error(error);
          toast("Dashboard muncul, tapi gagal submit ke database: " + error.message);
        });
    }

    function renderDashboard(result) {
      const scorePercent = Math.min(100, Math.round((result.total / 1000) * 100));

      const sectionRows = Object.values(result.sections).map(item => {
        const percent = Math.round((item.score / item.max) * 100);
        const status =
          percent >= 80 ? "Excellent" :
          percent >= 60 ? "Good" :
          percent >= 40 ? "Fair" :
          "Improve";

        return `
          <tr>
            <td>${escapeHtml(item.name)}</td>
            <td><strong>${item.score}</strong></td>
            <td>${item.max}</td>
            <td>
              <div class="mini-bar"><i style="width:${percent}%"></i></div>
              <span>${percent}%</span>
            </td>
            <td>${status}</td>

      const scoreRows = Object.entries(result.qScores)
        .filter(([qid]) => getMaxPoint(qid) > 0)
        .map(([qid, score]) => {

            <tr>
              <td>${q ? getVisibleQuestionNo(q) : qid}</td>
              <td>${escapeHtml(q ? q.title : "")}</td>

                  </ul>
                </div>`
              : ""

          <div class="result-grid">

              <p>${escapeHtml(result.recommendation)}</p>
            </div>

            <div class="profile-card">
              <h3>Profil Ringkas</h3>
              <p><span>Nama Usaha</span><strong>${escapeHtml(answerDisplay("Q10"))}</strong></p>
              <p><span>Sektor</span><strong>${escapeHtml(answerDisplay("Q12"))}</strong></p>
              <p><span>Lokasi</span><strong>${escapeHtml([answerDisplay("Q6"), answerDisplay("Q7")].filter(x => x !== "-").join(", ") || "-")}</strong></p>
              <p><span>Tanggal Input</span><strong>${escapeHtml(getAssessmentDateForSave())}</strong></p>
            </div>
          </div>

          <div class="section-title-line">
            <h3>Rincian Skor per Bagian</h3>
            <span>Maksimum total 1,000 poin</span>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Bagian</th>
                  <th>Skor</th>
                  <th>Maksimal</th>
                  <th>Progress</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>${sectionRows}</tbody>
            </table>
          </div>

          <div class="esg-grid">
            ${renderEsgCard("E", "Environmental / Lingkungan", result.eScore, 370)}
            ${renderEsgCard("S", "Social / Sosial", result.sScore, 160)}
            ${renderEsgCard("G", "Governance / Tata Kelola", result.gScore, 470)}
          </div>

          <div class="recommendation-grid">
            <div class="alert">
              <strong>Prioritas Terendah</strong>
              <p>
                ${result.weakest.map(x => `${x.name} (${Math.round((x.score / x.max) * 100)}%)`).join(" dan ")}
                perlu jadi fokus perbaikan pertama.
              </p>
            </div>

            <div class="alert soft">
              <strong>Catatan Penilaian</strong>
              <p>Q39 konsumsi air dicatat sebagai data pendukung. Skor air dihitung dari Q40.</p>
            </div>
          </div>

          <details class="score-details">
            <summary>Lihat rincian penilaian per pertanyaan</summary>
            <div class="table-wrap">
              <table>
                <thead>

    function normalizeText(value) {
      return String(value ?? "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[“”"]/g, "")
        .replace(/[–—]/g, "-")
        .replace(/\s+/g, " ")
        .trim();
    }

    function numericString(value) {
      const raw = String(value ?? "").trim();
      if (/^-?\d+(\.0+)?$/.test(raw)) return String(parseInt(raw, 10));
      const match = raw.match(/^-?\d+/);
      return match ? match[0] : "";
    }

    function isBlankExcelValue(value) {
      const n = normalizeText(value);
      return !n || n === "-" || n === "0 (skip)" || n === "skip";
    }

    function normalizeOptionValue(q, raw) {

      if (!q.options) return text;

      const options = q.options || [];
      const num = numericString(text);

      let found = options.find(o => o.value === text || normalizeText(o.label) === n || normalizeText(o.value) === n);
      if (found) return found.value;

      if (num) {
        found = options.find(o => o.value === num || normalizeText(o.label).startsWith(num + " "));

      const hasText = (...terms) => terms.some(term => n.includes(normalizeText(term)));

    function normalizeCheckboxValue(q, raw) {
      const text = String(raw ?? "").trim();
      const n = normalizeText(text);
      const selected = [];

      if (isBlankExcelValue(text)) return selected;

      const add = (value) => {
        if (value && !selected.includes(value)) selected.push(value);
      };
      const hasText = (...terms) => terms.some(term => n.includes(normalizeText(term)));

      (q.options || []).forEach(option => {
        const label = normalizeText(option.label);
        if (label && n.includes(label)) add(option.value);
      });

      if (q.id === "Q9") {
        if (hasText("belum memiliki")) add("no_legal");
        if (hasText("nib")) add("nib");
        if (hasText("npwp")) add("npwp");
        if (hasText("hki")) add("hki");
        if (hasText("sertifikasi produk")) add("sertifikasi_produk");
        if (hasText("pirt")) add("pirt");
        if (hasText("halal")) add("halal");
        if (hasText("bpom")) add("bpom");
        if (hasText("izin lingkungan", "ukl-upl", "amdal")) add("izin_lingkungan");
        if (hasText("hak merek")) add("hak_merek");
        if (hasText("sku")) add("sku");
        if (hasText("iso")) add("iso");
      }

      if (q.id === "Q31") {
        if (hasText("tidak ada")) add("none");
        if (hasText("efisiensi energi")) add("efficiency");
        if (hasText("listrik dari sumber energi terbarukan", "matahari", "angin")) add("renewable_electricity");
        if (hasText("multi purpose")) add("multipurpose");
        if (hasText("produksi atau distribusi energi bersih")) add("clean_energy_distribution");
        if (hasText("energi alternatif")) add("alternative_energy");
      }

      if (q.id === "Q45") {
        if (hasText("tidak sedang", "tidak ada", "0 (skip)")) add("none");
        if (hasText("bank")) add("bank");
        if (hasText("non-bank", "non bank", "lkb", "lkbb")) add("lkb");
        if (hasText("csr")) add("csr");
        if (hasText("koperasi")) add("koperasi");
        if (hasText("p2p")) add("p2p");
        if (hasText("kur")) add("kur");
        if (hasText("fintech", "teknologi keuangan")) add("fintech");
        if (hasText("pasar modal")) add("pasar_modal");
      }

      if (q.id === "Q54") {
        if (hasText("internasional")) add("international");
        if (hasText("pemerintah")) add("government");
        if (hasText("lsm", "civil society")) add("ngo");
        if (hasText("sesama pelaku")) add("peers");
        if (hasText("institusi keuangan", "perbankan", "investor", "venture capital")) add("finance");
        if (hasText("akademisi")) add("academic");
        if (hasText("konsumen")) add("consumer");
        if (hasText("pemasok")) add("pemasok");
        if (hasText("pendukung kegiatan hijau", "limbah", "emisi", "air")) add("green_support");
        if (hasText("asosiasi")) add("association");
      }

      const exclusiveRules = { Q9: "no_legal", Q31: "none", Q45: "none" };
      const exclusive = exclusiveRules[q.id];
      if (exclusive && selected.includes(exclusive)) return [exclusive];

      if (selected.length === 0 && q.other) {
        return ["other"];
      }

      return selected;
    }

    function normalizeRowAnswers(row) {
      const output = {};
      const raw = row.answersRaw || {};

      QUESTIONS.forEach(q => {
        const value = raw[q.id];
        if (value === undefined || value === null || String(value).trim() === "") return;

        if (q.type === "checkbox") {
          const selected = normalizeCheckboxValue(q, value);
          output[q.id] = selected;
          if (selected.includes("other")) output[q.id + "_other"] = String(value).trim();
        } else {
          const normalized = normalizeOptionValue(q, value);
          output[q.id] = normalized;
          if (normalized === "other") output[q.id + "_other"] = String(value).trim();
        }
      });

      return output;
    }

    function withTemporaryAnswers(tempAnswers, callback) {
      const previous = answers;
      answers = tempAnswers;
      try {
        return callback();
      } finally {
        answers = previous;
      }
    }

    function getUserAssessments() {
      if (userCache) return userCache;

      userCache = USER_ROWS.map((row, index) => {
        const normalizedAnswers = normalizeRowAnswers(row);
        const result = withTemporaryAnswers(normalizedAnswers, () => calculateScores());
        const completeCount = QUESTIONS.filter(q => {
          const previous = answers;
          answers = normalizedAnswers;
          try { return isAnswered(q); }
          finally { answers = previous; }
        }).length;

        return {
          index,
          rowNumber: row.rowNumber,
          timestamp: row.timestamp || "-",
          answers: normalizedAnswers,
          result,
          completeCount,
          name: normalizedAnswers.Q3 || "-",
          business: normalizedAnswers.Q10 || "-",
          city: normalizedAnswers.Q6 || "-",
          province: normalizedAnswers.Q7 || "-",
          sector: normalizedAnswers.Q12 || "-",
          asesor: normalizedAnswers.Q1 || "-",
          whatsapp: normalizedAnswers.Q8 || "-"
        };
      });

      return userCache;
    }

    function getManualAssessmentYear(user) {
      const dateValue = String(user.answers?.Q2 || "").trim();

      if (dateValue.length >= 4) {
        const year = Number(dateValue.substring(0, 4));
        if (Number.isFinite(year)) return year;
      }

      const timestamp = String(user.timestamp || "").trim();

      if (timestamp.length >= 4) {
        const year = Number(timestamp.substring(0, 4));
        if (Number.isFinite(year)) return year;
      }

      return new Date().getFullYear();
    }

    function buildManualAssessmentPayload(user) {
      const a = user.answers || {};
      const result = user.result || withTemporaryAnswers(a, () => calculateScores());

      return {
        id: null,

        assessorName: displayAnswerFromSet(a, "Q1"),
        assessmentDate: a.Q2 || null,
        respondentName: displayAnswerFromSet(a, "Q3"),

        */

        answersJson: JSON.stringify(a),
        scoresJson: JSON.stringify(result)
      };
    }

    async function importIndexHtmlRowsToDatabase() {
      const users = getUserAssessments();

      if (!users.length) {
        alert("Tidak ada data USER_ROWS yang bisa diimport.");
        return;
      }

      const confirmImport = confirm(
        "Import " + users.length + " data dari USER_ROWS index.html ke database?\n\n" +
        "Data yang sudah pernah diimport akan otomatis di-skip."
      );

      if (!confirmImport) return;

      console.log("Mulai import USER_ROWS ke database. Total:", users.length);

      const existingResponse = await fetch(API_BASE + "/api/admin/assessments");

      if (!existingResponse.ok) {
        throw new Error("Gagal mengambil data existing dari database. Pastikan backend hidup di " + API_BASE);
      }

      const existingData = await existingResponse.json();

      const existingBusinessCodes = new Set(
        existingData
          .map(item => item.businessCode)
          .filter(Boolean)
      );

      let imported = 0;
      let skipped = 0;
      let failed = 0;

      for (const user of users) {
        const payload = buildManualAssessmentPayload(user);

        if (existingBusinessCodes.has(payload.businessCode)) {
          skipped++;
          console.log("SKIP sudah ada:", payload.businessCode, payload.businessName);
          continue;
        }

        try {
          const response = await fetch(API_BASE + "/api/assessments/submit", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            let message = "Gagal import " + payload.businessName;

            try {
              const errorBody = await response.json();
              message = errorBody.message || message;
            } catch (e) {}

            throw new Error(message);
          }

          const saved = await response.json();

          imported++;
          existingBusinessCodes.add(payload.businessCode);

          console.log("IMPORTED:", saved.id, payload.businessCode, payload.businessName);
        } catch (error) {
          failed++;
          console.error("FAILED:", payload.businessCode, payload.businessName, error);
        }
      }

      const summary =
        "Import selesai.\n" +
        "Total data index.html: " + users.length + "\n" +
        "Berhasil import: " + imported + "\n" +
        "Di-skip karena sudah ada: " + skipped + "\n" +
        "Gagal: " + failed;

      console.log(summary);
      alert(summary);
    }

    function displayAnswerFromSet(sourceAnswers, qid) {
      const q = questionById(qid);
      const value = sourceAnswers[qid];

      if (!q) return "-";

      if (Array.isArray(value)) {
        const labels = value.map(v => {
          if (v === "other") return "Other: " + (sourceAnswers[qid + "_other"] || "");
          return optionLabel(q, v);
        }).filter(Boolean);

        return labels.length ? labels.join(", ") : "Tidak diisi";
      }

      if (value === "other") {
        return "Other: " + (sourceAnswers[qid + "_other"] || "");
      }

      if (q.options) return optionLabel(q, value) || "Tidak diisi";

      return String(value ?? "").trim() || "Tidak diisi";
    }

    function scorePercentValue(score, max) {
      return max ? Math.round((score / max) * 100) : 0;
    }

    function average(values) {
      const valid = values.filter(v => Number.isFinite(v));
      if (!valid.length) return 0;
      return valid.reduce((sum, v) => sum + v, 0) / valid.length;
    }

    function compactChartData(items, maxItems = 10) {
      const clean = (items || [])
        .filter(item => item && item.value !== undefined && Number(item.value) > 0)
        .map(item => ({ label: String(item.label || "-"), value: Number(item.value) || 0 }));

      if (clean.length <= maxItems) return clean;

      const main = clean.slice(0, maxItems - 1);
      const other = clean.slice(maxItems - 1).reduce((sum, item) => sum + item.value, 0);
      main.push({ label: "Lainnya", value: other });
      return main;
    }

    function countBy(items, getter, fallback = "Tidak diisi") {
      const map = new Map();
      items.forEach(item => {
        const raw = getter(item);
        const key = String(raw ?? "").trim() || fallback;
        map.set(key, (map.get(key) || 0) + 1);
      });
      return Array.from(map.entries())
        .map(([label, value]) => ({ label, value }))
        .sort((a, b) => b.value - a.value || a.label.localeCompare(b.label));
    }

      return numberedQuestions();

    function adminMainQuestionIds() {

    function makeDistributionRows(qid, limit = null) {
      const rows = getQuestionDistribution(qid);
      const visibleRows = limit ? rows.slice(0, limit) : rows;
      return visibleRows.map(row => `

      `).join("");
    }

    function getAdminStats() {
      const users = getUserAssessments();
      const totals = users.map(u => u.result.total);
      const avgTotal = Math.round(average(totals));
      const highest = users.length ? users.slice().sort((a, b) => b.result.total - a.result.total)[0] : null;
      const lowest = users.length ? users.slice().sort((a, b) => a.result.total - b.result.total)[0] : null;
      const disqualified = users.filter(u => u.result.disqualifiedReasons.length);
      const tier3Plus = users.filter(u => u.result.tier >= 3);
      const completionAvg = users.length ? Math.round(average(users.map(u => u.completeCount)) / QUESTIONS.length * 100) : 0;

      const tierData = countBy(users, u => `Tier ${u.result.tier}`);
      const provinceData = countBy(users, u => u.province && u.province !== "-" ? u.province : "Tidak diisi");
      const sectorData = countBy(users, u => u.sector && u.sector !== "-" ? u.sector : "Tidak diisi");

      const sectionKeys = Object.keys(users[0]?.result.sections || {});
      const sectionData = sectionKeys.map(key => {
        const sample = users[0].result.sections[key];
        const avgScore = Math.round(average(users.map(u => u.result.sections[key]?.score || 0)));
        const avgPct = scorePercentValue(avgScore, sample.max);
        return {
          key,
          label: sample.name.replace(/^[A-Z]\.\s*/, ""),
          shortLabel: sample.name.replace(/^[A-Z]\.\s*/, ""),
          fullLabel: sample.name,
          value: avgScore,
          max: sample.max,
          pct: avgPct
        };
      });

      return {
        users,
        avgTotal,
        highest,
        lowest,
        disqualified,
        tier3Plus,
        completionAvg,
        tierData,
        provinceData,
        sectorData,
        sectionData
      };
    }

    function getQuestionDistribution(qid) {
      const q = questionById(qid);
      const users = getUserAssessments();
      const map = new Map();

      users.forEach(user => {
        const raw = user.answers[qid];
        let labels = [];

        if (Array.isArray(raw)) {
          labels = raw.length ? raw.map(value => {
            if (value === "other") return "Other";
            return optionLabel(q, value) || String(value || "Tidak diisi");
          }) : ["Tidak diisi"];
        } else if (raw === "other") {
          labels = ["Other"];
        } else {
          const label = displayAnswerFromSet(user.answers, qid);
          labels = [label || "Tidak diisi"];
        }

        labels.forEach(label => {
          const clean = String(label || "Tidak diisi").trim() || "Tidak diisi";
          map.set(clean, (map.get(clean) || 0) + 1);
        });
      });

      return Array.from(map.entries())
        .map(([label, value]) => ({ label, value, percent: users.length ? Math.round(value / users.length * 100) : 0 }))
        .sort((a, b) => b.value - a.value || a.label.localeCompare(b.label));
    }

        return {

          no: getVisibleQuestionNo(q),
          title: q.title,

          type: q.type,

          topLabel: top?.label || "-",

      });
    }

    function getCanvasRenderHeight(canvasId, type, itemCount, width) {
      const isMobile = width <= 640;
      const count = Math.max(1, itemCount || 0);

      if (["pie", "doughnut"].includes(type)) {
        if (isMobile) {
          const rows = Math.ceil(count / 2);
          return Math.min(360, Math.max(220, 150 + rows * 28));
        }
        return Math.min(420, Math.max(270, 170 + count * 22));
      }

      if (type === "horizontalBar") {
        const base = isMobile ? 110 : 120;
        const perRow = isMobile ? 34 : 32;
        return Math.min(isMobile ? 430 : 520, Math.max(isMobile ? 220 : 250, base + count * perRow));
      }

      if (type === "line") {
        return isMobile ? 260 : 290;
      }

      return isMobile ? 250 : 285;
    }

    function drawSimpleChart(canvasId, items, type = "bar", options = {}) {
      const canvas = document.getElementById(canvasId);
      if (!canvas || !canvas.getContext) return;

      const data = compactChartData(items || [], options.maxItems || 12);
      const wrapperWidth = canvas.parentElement ? canvas.parentElement.clientWidth : 760;
      const width = Math.max(260, wrapperWidth - 4);
      const height = getCanvasRenderHeight(canvasId, type, data.length, width);
      const dpr = window.devicePixelRatio || 1;
      canvas.style.width = "100%";
      canvas.style.height = height + "px";
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);

      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.font = "12px Inter, Arial, sans-serif";
      ctx.textBaseline = "middle";

      if (!data.length) {
        ctx.fillStyle = "#66756d";
        ctx.fillText("Belum ada data", 24, height / 2);
        return;
      }

      if (["pie", "doughnut"].includes(type)) {
        drawPieChart(ctx, data, width, height, type === "doughnut");
      } else if (type === "horizontalBar") {
        drawHorizontalBarChart(ctx, data, width, height);
      } else if (type === "line") {
        drawLineChart(ctx, data, width, height);
      } else {
        drawBarChart(ctx, data, width, height);
      }
    }

    function truncateLabel(label, max = 18) {
      const text = String(label || "-");
      return text.length > max ? text.slice(0, max - 1) + "…" : text;
    }

    function drawBarChart(ctx, data, width, height) {
      const pad = { top: 24, right: 18, bottom: 58, left: 44 };
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;
      const max = Math.max(...data.map(d => d.value), 1);
      const barW = Math.max(10, chartW / data.length * .62);
      const gap = chartW / data.length;

      ctx.strokeStyle = "rgba(16,37,27,.12)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = pad.top + chartH - (chartH / 4 * i);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
      }

      data.forEach((d, i) => {
        const h = chartH * (d.value / max);
        const x = pad.left + gap * i + (gap - barW) / 2;
        const y = pad.top + chartH - h;
        ctx.fillStyle = chartColor(i, .9);
        roundRect(ctx, x, y, barW, h, 8);
        ctx.fill();

        ctx.fillStyle = "#10251b";
        ctx.font = "700 12px Inter, Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(String(d.value), x + barW / 2, Math.max(12, y - 10));

        ctx.save();
        ctx.translate(x + barW / 2, pad.top + chartH + 14);
        ctx.rotate(-Math.PI / 6);
        ctx.fillStyle = "#66756d";
        ctx.font = "11px Inter, Arial, sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(truncateLabel(d.label, 13), 0, 0);
        ctx.restore();
      });
    }

    function drawHorizontalBarChart(ctx, data, width, height) {
      const isMobile = width < 640;
      const pad = { top: 16, right: isMobile ? 36 : 46, bottom: 18, left: isMobile ? 112 : 150 };
      const chartW = Math.max(80, width - pad.left - pad.right);
      const rowH = Math.max(isMobile ? 28 : 22, (height - pad.top - pad.bottom) / data.length);
      const max = Math.max(...data.map(d => d.value), 1);
      const labelMax = isMobile ? 14 : 21;

      data.forEach((d, i) => {
        const y = pad.top + i * rowH + rowH * .16;
        const h = rowH * .58;
        const w = chartW * (d.value / max);
        ctx.fillStyle = "#4b5f57";
        ctx.font = `${isMobile ? 600 : 700} ${isMobile ? 10 : 11}px Inter, Arial, sans-serif`;
        ctx.textAlign = "right";
        ctx.fillText(truncateLabel(d.label, labelMax), pad.left - 10, y + h / 2);

        ctx.fillStyle = "rgba(22,128,71,.10)";
        roundRect(ctx, pad.left, y, chartW, h, 8);
        ctx.fill();

        ctx.fillStyle = chartColor(i, .9);
        roundRect(ctx, pad.left, y, Math.max(4, w), h, 8);
        ctx.fill();

        ctx.fillStyle = "#10251b";
        ctx.textAlign = "left";
        ctx.font = `800 ${isMobile ? 11 : 12}px Inter, Arial, sans-serif`;
        ctx.fillText(String(d.value), Math.min(width - 22, pad.left + w + 8), y + h / 2);
      });
    }

    function drawLineChart(ctx, data, width, height) {
      const pad = { top: 26, right: 22, bottom: 52, left: 44 };
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;
      const max = Math.max(...data.map(d => d.value), 1);
      const step = data.length > 1 ? chartW / (data.length - 1) : chartW;

      ctx.strokeStyle = "rgba(16,37,27,.12)";
      for (let i = 0; i <= 4; i++) {
        const y = pad.top + chartH - (chartH / 4 * i);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "#168047";
      ctx.lineWidth = 3;
      ctx.beginPath();
      data.forEach((d, i) => {
        const x = pad.left + step * i;
        const y = pad.top + chartH - chartH * (d.value / max);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      data.forEach((d, i) => {
        const x = pad.left + step * i;
        const y = pad.top + chartH - chartH * (d.value / max);
        ctx.fillStyle = chartColor(i, 1);
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#10251b";
        ctx.font = "800 12px Inter, Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(String(d.value), x, y - 14);
        ctx.save();
        ctx.translate(x, pad.top + chartH + 16);
        ctx.rotate(-Math.PI / 6);
        ctx.fillStyle = "#66756d";
        ctx.font = "11px Inter, Arial, sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(truncateLabel(d.label, 13), 0, 0);
        ctx.restore();
      });
    }

    function drawPieChart(ctx, data, width, height, doughnut = false) {
      const total = data.reduce((sum, d) => sum + d.value, 0) || 1;
      const isMobile = width < 680;
      const radius = isMobile
        ? Math.min(74, width * .22, (height - 50) * .22)
        : Math.min(height * .22, width * .18);
      const cx = isMobile ? width / 2 : Math.min(width * .28, 220);
      const cy = isMobile ? 90 : height / 2;
      let start = -Math.PI / 2;

      data.forEach((d, i) => {
        const angle = Math.PI * 2 * (d.value / total);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, start + angle);
        ctx.closePath();
        ctx.fillStyle = chartColor(i, .92);
        ctx.fill();
        start += angle;
      });

      if (doughnut) {
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.arc(cx, cy, radius * .56, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "#10251b";
        ctx.font = `900 ${isMobile ? 16 : 18}px Inter, Arial, sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText(String(total), cx, cy);
        ctx.font = `${isMobile ? 10 : 11}px Inter, Arial, sans-serif`;
        ctx.fillStyle = "#66756d";
        ctx.fillText("total", cx, cy + (isMobile ? 18 : 20));
      }

      if (isMobile) {
        const itemsPerCol = Math.ceil(data.length / 2);
        const col1X = 22;
        const col2X = Math.max(width / 2 + 4, 170);
        const legendStartY = cy + radius + 24;
        data.forEach((d, i) => {
          const col = i < itemsPerCol ? 0 : 1;
          const row = col === 0 ? i : i - itemsPerCol;
          const x = col === 0 ? col1X : col2X;
          const y = legendStartY + row * 24;
          ctx.fillStyle = chartColor(i, .92);
          roundRect(ctx, x, y - 6, 12, 12, 3);
          ctx.fill();
          ctx.fillStyle = "#10251b";
          ctx.font = "700 11px Inter, Arial, sans-serif";
          ctx.textAlign = "left";
          ctx.fillText(`${truncateLabel(d.label, 11)} (${d.value})`, x + 18, y);
        });
      } else {
        const legendX = Math.min(cx + radius + 42, width * .55);
        let legendY = Math.max(28, cy - (data.length * 21) / 2);
        data.forEach((d, i) => {
          ctx.fillStyle = chartColor(i, .92);
          roundRect(ctx, legendX, legendY - 6, 12, 12, 3);
          ctx.fill();
          ctx.fillStyle = "#10251b";
          ctx.font = "700 12px Inter, Arial, sans-serif";
          ctx.textAlign = "left";
          ctx.fillText(`${truncateLabel(d.label, 24)} (${d.value})`, legendX + 18, legendY);
          legendY += 22;
        });
      }
    }

    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }


    function toast(message) {
      let el = $("#toast");

      if (!el) {
        el = document.createElement("div");
        el.id = "toast";
        el.className = "toast";
        document.body.appendChild(el);
      }

      el.textContent = message;
      el.classList.add("show");

      setTimeout(() => {
        el.classList.remove("show");
      }, 2400);
    }


    function getCurrentTheme() {
      try {
        return "corporate";
      } catch (e) {
        return document.documentElement.getAttribute("data-theme") || "corporate";
      }
    }

    function setUiTheme(theme) {
      const safeTheme = ["default", "premium", "corporate", "combo"].includes(theme) ? theme : "corporate";
      document.documentElement.setAttribute("data-theme", safeTheme);

      try {
        localStorage.setItem("green_sme_ui_theme", safeTheme);
      } catch (e) {}

      $$(".theme-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.themeChoice === safeTheme);
      });
    }

    function initThemeSwitcher() {
      setUiTheme("corporate");

      $$("[data-theme-choice]").forEach(btn => {
        btn.addEventListener("click", () => {
          setUiTheme(btn.dataset.themeChoice);
          toast("Color mode diubah: " + btn.textContent.trim());
        });
      });
    }

    function initHeader() {
      $("#menuFormBtn")?.addEventListener("click", () => showPage("form"));
      $("#menuUsersBtn")?.addEventListener("click", () => showPage("users"));
      $("#menuAdminBtn")?.addEventListener("click", () => showPage("admin"));
      $("#topMenuFormBtn")?.addEventListener("click", () => showPage("form"));
      $("#topMenuUsersBtn")?.addEventListener("click", () => showPage("users"));
      $("#topMenuAdminBtn")?.addEventListener("click", () => showPage("admin"));

      $("#resetHeaderBtn")?.addEventListener("click", () => {
        if (confirm("Reset semua jawaban? Data sementara di browser akan dihapus.")) {
          resetSavedData();
        }
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      initHeader();
      initThemeSwitcher();
      showPage("form");
    });
  </script>

      border-radius: 15px;
      padding: 13px 18px;
      font-weight: 900;
      cursor: pointer;
      transition: .18s ease;
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .btn.primary {
      color: white;
      background: linear-gradient(135deg, var(--green), #45b96a);
      box-shadow: 0 12px 28px rgba(22, 128, 71, .24);
    }

    .btn.primary:hover:not(:disabled),
    .btn.secondary:hover:not(:disabled),
    .btn.ghost:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .btn.secondary {
      background: white;
      border: 1px solid var(--line);
      color: var(--green-2);
    }

    .btn.ghost {
      background: var(--green-soft);
      color: var(--green-2);
      border: 1px solid #bce8ca;
    }

    .dashboard {
      margin-top: 30px;
      padding: 28px;
    }

    .dash-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .dash-head h2 {
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -.04em;
      margin-bottom: 8px;
    }

    .dash-head p {
      color: var(--muted);
      margin-bottom: 0;
      line-height: 1.6;
    }

    .dash-actions {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 220px 1fr 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .score-meter {
      --pct: 0;
      min-height: 220px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        radial-gradient(circle at center, white 58%, transparent 59%),
        conic-gradient(var(--green) calc(var(--pct) * 1%), #e5eee9 0);
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.75);
    }

    .score-meter strong {
      display: block;
      font-size: 48px;
      line-height: 1;
      letter-spacing: -.06em;
    }

    .score-meter span {
      color: var(--muted);
      font-weight: 800;
    }

    .tier-card,
    .profile-card,
    .esg-card,
    .alert {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fbfffc;
      padding: 22px;
    }

    .tier-num {
      display: inline-block;
      padding: 8px 11px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green-2);
      font-weight: 900;
      margin-bottom: 14px;
    }

    .tier-card h3,
    .profile-card h3 {
      font-size: 24px;
      letter-spacing: -.03em;
      margin-bottom: 10px;
    }

    .tier-card p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 0;
    }

    .profile-card p {
      display: grid;
      gap: 3px;
      margin: 0 0 12px;
    }

    .profile-card span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .profile-card strong {
      line-height: 1.4;
    }

    .section-title-line {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin: 30px 0 14px;
      gap: 18px;
    }

    .section-title-line h3 {
      margin-bottom: 0;
      font-size: 24px;
      letter-spacing: -.03em;
    }

    .section-title-line span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    th {
      background: #f3fbf6;
      color: var(--green-2);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .mini-bar {
      width: 140px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }

    .esg-grid,
    .recommendation-grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .recommendation-grid {
      grid-template-columns: 1fr 1fr;
    }

    .esg-card span {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--green);
      color: white;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .esg-card h3 {
      margin-bottom: 8px;
      font-size: 20px;
    }

    .esg-card strong {
      display: block;
      font-size: 26px;
      margin-bottom: 10px;
    }

    .esg-card small {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-weight: 800;
    }

    .alert {
      background: var(--yellow-soft);
      line-height: 1.65;
    }

    .alert p {
      margin-bottom: 0;
      color: #57420c;
    }

    .alert.danger {
      background: var(--red-soft);
      border-color: rgba(217,45,32,.25);
      margin-bottom: 20px;
    }

    .alert.danger strong {
      color: var(--red);
    }

    .alert.danger ul {
      margin: 10px 0 0;
      padding-left: 20px;
    }

    .alert.soft {
      background: var(--blue-soft);
    }

    .score-details {
      margin-top: 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
    }

    .score-details summary {
      cursor: pointer;
      padding: 18px;
      font-weight: 900;
      color: var(--green-2);
    }

    .score-details .table-wrap {
      border-radius: 0;
      border-left: 0;
      border-right: 0;
      border-bottom: 0;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: #10251b;
      color: white;
      padding: 13px 16px;
      border-radius: 999px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 999;
      box-shadow: 0 16px 34px rgba(0,0,0,.18);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }



    .main-menu {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f7fbf8;
    }

    .menu-btn {
      border: 0;
      background: transparent;
      color: var(--green-2);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 13px;
      cursor: pointer;
      transition: .2s ease;
      white-space: nowrap;
    }

    .menu-btn.active,
    .menu-btn:hover {
      background: var(--green);
      color: white;
      box-shadow: 0 10px 22px rgba(22, 128, 71, .16);
    }

    .users-mode #completionBadge,
    .users-mode #resetHeaderBtn,
    .admin-mode #completionBadge,
    .admin-mode #resetHeaderBtn {
      display: none;
    }

    [hidden] {
      display: none !important;
    }

    .users-hero {
      margin-bottom: 22px;
    }

    .users-kpi-grid,
    .detail-info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-top: 22px;
    }

    .users-kpi,
    .detail-info-grid > div {
      background: #f4fbf6;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .users-kpi span,
    .detail-info-grid span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .users-kpi strong,
    .detail-info-grid strong {
      display: block;
      color: var(--text);
      font-size: 22px;
      line-height: 1.25;
    }

    .user-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    .user-toolbar h2 {
      font-size: 24px;
      margin-bottom: 4px;
      letter-spacing: -.03em;
    }

    .user-toolbar p {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
    }

    .user-toolbar input {
      max-width: 420px;
      margin: 0;
    }


    .user-search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      width: min(520px, 100%);
    }

    .user-search-box input {
      flex: 1;
      min-width: 0;
      max-width: none;
    }

    .search-user-btn {
      min-width: 112px;
      height: 48px;
      padding-inline: 18px;
      white-space: nowrap;
    }

    .user-list {
      display: grid;
      gap: 14px;
    }

    .user-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px auto;
      align-items: center;
      gap: 18px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,252,249,.98));
    }

    .user-card-main {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .user-avatar {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: var(--green-soft);
      color: var(--green-2);
      font-size: 24px;
      font-weight: 1000;
    }

    .row-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 4px;
    }

    .user-card h3 {
      margin: 0 0 6px;
      font-size: 21px;
      letter-spacing: -.03em;
      line-height: 1.18;
    }

    .user-card p {
      margin: 0;
      color: #596c63;
      font-weight: 700;
      line-height: 1.5;
    }

    .user-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .user-tags span {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--green-2);
      font-weight: 900;
    }

    .user-score-box {
      text-align: right;
    }

    .user-score-box strong {
      font-size: 28px;
      letter-spacing: -.03em;
    }

    .user-score-box span {
      color: var(--muted);
      font-weight: 800;
    }

    .user-score-box small {
      display: block;
      margin: 5px 0 8px;
      color: var(--green-2);
      font-weight: 900;
    }

    .detail-hero .back-user-list {
      margin-bottom: 18px;
      width: fit-content;
    }
    #app[hidden],
    #usersPage[hidden],
    #adminPage[hidden] {
      display: none !important;
    }


    .admin-hero {
      margin-bottom: 22px;
    }

    .admin-kpi-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-top: 22px;
    }

    .admin-kpi {
      background: #f4fbf6;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      min-width: 0;
    }

    .admin-kpi span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .admin-kpi strong {
      display: block;
      color: var(--text);
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: -.04em;
    }

    .admin-kpi small {
      display: block;
      color: var(--green-2);
      font-weight: 800;
      margin-top: 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .admin-chart-grid,
    .admin-table-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 18px;
    }

    .admin-panel {
      padding: 24px;
      margin-bottom: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,252,249,.98));
    }

    .admin-panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 16px;
    }

    .admin-panel-head h2 {
      margin: 0 0 4px;
      font-size: 22px;
      letter-spacing: -.03em;
    }

    .admin-panel-head p {
      margin: 0;
      color: #5c6f67;
      font-weight: 700;
      line-height: 1.55;
    }

    .chart-select {
      width: auto;
      min-width: 150px;
      margin: 0;
      padding: 12px 38px 12px 14px;
      font-size: 13px;
      font-weight: 800;
      border-radius: 16px;
      background-color: #fff;
      border: 1px solid #cfe0d6;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }

    .wide-select {
      min-width: min(560px, 100%);
      max-width: 100%;
    }

    .question-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .admin-chart {
      display: block;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff, #fbfffc);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
    }

    .question-chart {
      margin-bottom: 16px;
    }

    .table-scroll {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }

    .tall-table {
      max-height: 520px;
    }

    .question-dist-table {
      max-height: 300px;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
      font-size: 14px;
    }

    .admin-table th,
    .admin-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    .admin-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f4fbf6;
      color: var(--green-2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-weight: 1000;
    }

    .admin-table tr:last-child td {
      border-bottom: 0;
    }

    .admin-table tbody tr:hover {
      background: rgba(22, 128, 71, .045);
    }

    .question-summary-table tbody tr {
      cursor: pointer;
      transition: .15s ease;
    }

    .question-summary-table tbody tr:hover,
    .question-summary-table tbody tr.active {
      background: var(--green-soft);
    }



    .question-panel {
      overflow: hidden;
    }

    .question-head {
      display: block;
    }

    .question-head > div:first-child {
      margin-bottom: 14px;
    }

    .question-controls {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 170px;
      align-items: stretch;
    }

    .question-controls .chart-select,
    .question-controls .wide-select {
      width: 100%;
      min-width: 0;
      max-width: none;
    }

    .asesor-bottom-section {
      margin-top: 4px;
    }

    .asesor-table {
      margin-top: 14px;
    }

    .admin-panel,
    .admin-chart,
    .table-scroll {
      min-width: 0;
    }


    /* ===== Dynamic Color Mode Switcher ===== */
    .theme-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      box-shadow: 0 10px 22px rgba(16, 37, 27, .04);
    }

    .theme-switcher > span {
      padding-left: 9px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .05em;
      white-space: nowrap;
    }

    .theme-options {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .theme-btn {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 8px 10px;
      background: transparent;
      color: var(--green-2);
      font-size: 12px;
      font-weight: 1000;
      white-space: nowrap;
      transition: .18s ease;
    }

    .theme-btn:hover,
    .theme-btn.active {
      background: var(--green);
      color: #fff;
      box-shadow: 0 10px 20px rgba(22, 128, 71, .16);
      transform: translateY(-1px);
    }

    /* Emerald Mode */
    html[data-theme="premium"] {
      --bg: #f5efe3;
      --bg-2: #fffaf1;
      --card: #fffdf8;
      --text: #1f271d;
      --muted: #7b725f;
      --green: #0f5f42;
      --green-2: #0a3f2d;
      --green-soft: #ecdfbd;
      --blue-soft: #f6eddb;
      --yellow-soft: #fff4cf;
      --line: #e7d7b4;
      --shadow: 0 24px 70px rgba(76, 55, 23, .16);
      --shadow-soft: 0 14px 34px rgba(76, 55, 23, .10);
    }

    html[data-theme="premium"] body {
      background:
        radial-gradient(circle at 8% 2%, rgba(177, 142, 71, .24), transparent 29rem),
        radial-gradient(circle at 88% 5%, rgba(15, 95, 66, .15), transparent 26rem),
        linear-gradient(180deg, #fffaf1 0%, #f5efe3 52%, #fffdf8 100%);
    }

    html[data-theme="premium"] .brand-logo,
    html[data-theme="premium"] .esg-card span {
      background: linear-gradient(135deg, #0f5f42, #b18e47);
      box-shadow: 0 14px 28px rgba(177, 142, 71, .25);
    }

    html[data-theme="premium"] .hero,
    html[data-theme="premium"] .section-card,
    html[data-theme="premium"] .admin-panel,
    html[data-theme="premium"] .user-card {
      background:
        linear-gradient(145deg, rgba(255,253,248,.98), rgba(248,239,217,.92));
    }

    html[data-theme="premium"] .eyebrow,
    html[data-theme="premium"] .section-card span,
    html[data-theme="premium"] .q-head h3 span {
      color: #9c7333;
    }

    html[data-theme="premium"] .component-list span,
    html[data-theme="premium"] .tier-num,
    html[data-theme="premium"] .score-chip,
    html[data-theme="premium"] .user-tags span {
      background: #f1e1bd;
      color: #654b20;
      border-color: #e1c992;
    }

    html[data-theme="premium"] th,
    html[data-theme="premium"] .admin-table th {
      background: #f5ead0;
      color: #654b20;
    }

    /* Navy Mode */
    html[data-theme="corporate"] {
      --bg: #eef3f7;
      --bg-2: #f8fbfd;
      --card: #ffffff;
      --text: #102033;
      --muted: #5b6878;
      --green: #0f6b5b;
      --green-2: #0b3d4c;
      --green-soft: #e4f1f0;
      --blue-soft: #e9f1fb;
      --yellow-soft: #fff7dc;
      --line: #d6e0e8;
      --shadow: 0 18px 54px rgba(16, 32, 51, .10);
      --shadow-soft: 0 12px 30px rgba(16, 32, 51, .07);
    }

    html[data-theme="corporate"] body {
      background:
        radial-gradient(circle at 0% 0%, rgba(15, 107, 91, .13), transparent 27rem),
        linear-gradient(180deg, #fbfdff 0%, #eef3f7 52%, #f8fbfd 100%);
    }

    html[data-theme="corporate"] .site-header {
      background: rgba(255,255,255,.92);
      border-bottom-color: #d5e0e7;
    }

    html[data-theme="corporate"] .brand-logo,
    html[data-theme="corporate"] .menu-btn.active,
    html[data-theme="corporate"] .theme-btn.active,
    html[data-theme="corporate"] .esg-card span {
      background: linear-gradient(135deg, #0b3d4c, #0f6b5b);
    }

    html[data-theme="corporate"] .hero,
    html[data-theme="corporate"] .section-card,
    html[data-theme="corporate"] .admin-panel,
    html[data-theme="corporate"] .user-card {
      background: linear-gradient(180deg, #ffffff, #f8fbfd);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
    }

    html[data-theme="corporate"] .card,
    html[data-theme="corporate"] .question-card,
    html[data-theme="corporate"] .section-card {
      border-radius: 18px;
    }

    html[data-theme="corporate"] h1,
    html[data-theme="corporate"] h2,
    html[data-theme="corporate"] h3 {
      letter-spacing: -.025em;
    }

    html[data-theme="corporate"] th,
    html[data-theme="corporate"] .admin-table th {
      background: #eef4f8;
      color: #0b3d4c;
    }

    /* Sage Mode */
    html[data-theme="combo"] {
      --bg: #eef5f1;
      --bg-2: #fbfcf7;
      --card: #ffffff;
      --text: #13251f;
      --muted: #5f6e67;
      --green: #116b4a;
      --green-2: #0c3f34;
      --green-soft: #e6f3e9;
      --blue-soft: #edf3ef;
      --yellow-soft: #fff5d6;
      --line: #d9e3d8;
      --shadow: 0 22px 66px rgba(19, 37, 31, .11);
      --shadow-soft: 0 12px 34px rgba(19, 37, 31, .08);
    }

    html[data-theme="combo"] body {
      background:
